version: "3.9"
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: cardcard
      POSTGRES_PASSWORD: cardcard
      POSTGRES_DB: cardcard
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  pgdata:
